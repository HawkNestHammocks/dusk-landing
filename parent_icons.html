<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0}body{width:1720px;height:600px;background:#fff;display:flex;gap:60px;align-items:center;justify-content:center;font-family:sans-serif}
.tile{width:512px;height:512px;border-radius:0;display:flex;align-items:center;justify-content:center;position:relative}
.lbl{position:absolute;bottom:-40px;left:0;right:0;text-align:center;font-size:24px;color:#333}
</style></head><body>

<div class="tile" style="background:#0e1033">
  <svg viewBox="0 0 120 120" style="width:330px">
    <path d="M92 26 a44 44 0 1 0 14 34 a34 34 0 1 1 -14 -34Z" fill="#f2eddd"/>
  </svg>
  <div class="lbl">A — ivory crescent</div>
</div>

<div class="tile" style="background:#0e1033">
  <svg viewBox="0 0 120 120" style="width:330px">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8cf96"/><stop offset="55%" stop-color="#d9a9c4"/><stop offset="100%" stop-color="#9db8ff"/>
    </linearGradient></defs>
    <path d="M92 26 a44 44 0 1 0 14 34 a34 34 0 1 1 -14 -34Z" fill="url(#g)"/>
  </svg>
  <div class="lbl">B — gold→violet gradient crescent</div>
</div>

<div class="tile" style="background:#0e1033">
  <svg viewBox="0 0 220 200" style="width:360px">
    <circle cx="100" cy="110" r="82" fill="none" stroke="#f2eddd" stroke-width="4"/>
    <path d="M68 144 V80 L100 122 L132 80 V144" fill="none" stroke="#f2eddd" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M186 22 a26 26 0 1 0 8 20 a20 20 0 1 1 -8 -20Z" fill="#f2eddd"/>
  </svg>
  <div class="lbl">C — M^moon in ivory (neutral Moonset mark)</div>
</div>

</body></html>
